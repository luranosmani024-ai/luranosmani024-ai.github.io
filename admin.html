<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ST117 — Admin Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;700&family=Inter:wght@900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #08080a;
  --bg-elevated: #111114;
  --bg-card: #16161a;
  --ink: #f8f6f2;
  --ink-mid: #a19d96;
  --ink-soft: #68635d;
  --red: #c8102e;
  --red-glow: rgba(200, 16, 46, 0.15);
  --border: rgba(255, 255, 255, 0.08);
  --radius: 12px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg); color:var(--ink);
  font-family:'DM Sans', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column;
}

/* ── LOGIN ── */
#loginScreen {
  position:fixed; inset:0; z-index:9999; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
#loginScreen.gone{display:none;}
.login-brand h1 { font-family: 'Inter', sans-serif; font-size: 4rem; color: var(--red); letter-spacing: -0.05em; margin-bottom: 2rem; }
.login-card { width: 340px; background: var(--bg-card); padding: 2.5rem; border-radius: var(--radius); border: 1px solid var(--border); }
.login-card input { width: 100%; padding: 1rem; background: var(--bg-elevated); border: 1px solid var(--border); color: #fff; border-radius: 8px; margin: 1rem 0; outline: none; }
.btn-prime { width: 100%; padding: 1rem; background: var(--red); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
.btn-prime:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── LAYOUT ── */
#app { display:none; min-height:100vh; flex-direction:column; }
#app.on { display:flex; }
.topbar { height: 70px; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
.app-body { display: flex; flex: 1; height: calc(100vh - 70px); }

/* ── SIDEBAR ── */
.sidebar { width: 260px; background: var(--bg-elevated); border-right: 1px solid var(--border); padding: 2rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
.artist-profile-box { text-align: center; margin-bottom: 1rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
.artist-avatar-circle {
  width: 80px; height: 80px; border-radius: 50%; background: var(--bg-card);
  margin: 0 auto 1rem; border: 2px solid var(--red); overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.artist-avatar-circle img { width: 100%; height: 100%; object-fit: cover; }
.nav-btn { padding: 0.8rem 1rem; border: none; background: none; color: var(--ink-mid); text-align: left; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; }
.nav-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
.nav-btn.active { background: var(--red-glow); color: var(--red); font-weight: 700; }

/* ── CONTENT ── */
.main-content { flex: 1; padding: 3rem; overflow-y: auto; }
.panel { display: none; max-width: 800px; margin: 0 auto; }
.panel.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

.card { background: var(--bg-card); padding: 2rem; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 2rem; }
.card h2 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; margin-bottom: 1.5rem; }

.field { margin-bottom: 1.5rem; }
.field label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-soft); margin-bottom: 0.5rem; font-weight: 700; }
.field input, .field select, .field textarea {
  width: 100%; padding: 0.8rem 1rem; background: var(--bg-elevated); border: 1px solid var(--border); color: #fff; border-radius: 8px; outline: none; font-family: inherit;
}

/* ── UPLOAD SHAPE ── */
.upload-placeholder {
  width: 100%; height: 250px; border: 2px dashed var(--border); border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; background: var(--bg-elevated); overflow: hidden; position: relative;
}
.upload-placeholder:hover { border-color: var(--red); }
.upload-placeholder img { width: 100%; height: 100%; object-fit: contain; }

/* ── LISTS ── */
.archive-item {
  display: flex; align-items: center; gap: 1rem; padding: 1rem;
  background: var(--bg-elevated); border-radius: 10px; margin-bottom: 0.5rem; border: 1px solid var(--border);
}
.archive-thumb { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; }
.archive-info { flex: 1; }
.btn-del { padding: 0.4rem 0.8rem; background: rgba(200, 16, 46, 0.1); border: 1px solid var(--red); color: var(--red); border-radius: 6px; cursor: pointer; font-size: 0.7rem; }

#statusMsg { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 2rem; border-radius: 8px; z-index: 1000; font-weight: 700; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.ok { background: #10b981; color: #fff; }
.err { background: #ef4444; color: #fff; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-brand"><h1>ST117</h1></div>
  <div class="login-card">
    <input type="password" id="pwInput" placeholder="Master Password">
    <button class="btn-prime" id="loginBtn">Enter Studio</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="font-family:'Inter', sans-serif; font-weight:900; color:var(--red); font-size:1.2rem;">ST117 / STUDIO</div>
    <div style="font-size:0.7rem; color:var(--ink-soft); letter-spacing:0.1em;">SYSTEM READY</div>
  </div>

  <div class="app-body">
    <nav class="sidebar">
      <div class="artist-profile-box">
        <div class="artist-avatar-circle" id="sidebarAvatar">
          <img src="https://via.placeholder.com/80" id="currentArtistImg">
        </div>
        <div style="font-weight:700; font-size:0.8rem; letter-spacing:0.05em;">LURAN OSMANI</div>
      </div>
      <button class="nav-btn active" onclick="showPanel('publish', this)">Publish New</button>
      <button class="nav-btn" onclick="showPanel('archive', this)">Manage Archive</button>
      <button class="nav-btn" onclick="showPanel('identity', this)">Studio Identity</button>
      <button class="nav-btn" onclick="showPanel('token', this)">GitHub Access</button>
      <div style="margin-top:auto;">
         <button class="nav-btn" onclick="location.reload()" style="color:var(--red);">Logout</button>
      </div>
    </nav>

    <main class="main-content">
      <!-- PUBLISH -->
      <div id="panel-publish" class="panel active">
        <div class="card">
          <h2>Deploy Artwork</h2>
          <div class="field">
            <label>Image (Upload future works)</label>
            <div class="upload-placeholder" onclick="document.getElementById('artworkFile').click()">
              <img id="artworkPreview" style="display:none;">
              <div id="uploadText">Click to select image</div>
            </div>
            <input type="file" id="artworkFile" style="display:none;" onchange="preview(this, 'artworkPreview', 'uploadText')">
          </div>
          <div class="field"><label>Title</label><input type="text" id="artTitle"></div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="field">
              <label>Category</label>
              <select id="artType">
                <option>Paintings</option>
                <option>Drawings</option>
                <option>Photography</option>
                <option>Printmaking</option>
                <option>Mixed Media</option>
              </select>
            </div>
            <div class="field"><label>Year</label><input type="text" id="artYear" value="2026"></div>
          </div>
          <button class="btn-prime" id="publishBtn">Confirm & Deploy</button>
        </div>
      </div>

      <!-- ARCHIVE -->
      <div id="panel-archive" class="panel">
        <div class="card">
          <h2>Archive Management</h2>
          <div id="archiveList"><p style="color:var(--ink-soft)">Loading from GitHub...</p></div>
        </div>
      </div>

      <!-- IDENTITY -->
      <div id="panel-identity" class="panel">
        <div class="card">
          <h2>Identity Details</h2>
          <div class="field">
            <label>Update Artist Photo (Rounded Shape)</label>
            <div class="artist-avatar-circle" style="width:140px; height:140px; cursor:pointer;" onclick="document.getElementById('profileFile').click()">
              <img id="profilePreview" src="https://via.placeholder.com/140">
            </div>
            <input type="file" id="profileFile" style="display:none;" onchange="preview(this, 'profilePreview')">
          </div>
          <button class="btn-prime" id="saveIdentityBtn">Update Identity</button>
        </div>
      </div>

      <!-- TOKEN -->
      <div id="panel-token" class="panel">
        <div class="card">
          <h2>Access Token</h2>
          <div class="field">
            <label>GitHub Personal Access Token</label>
            <input type="password" id="ghToken" placeholder="ghp_...">
          </div>
          <button class="btn-prime" onclick="saveToken()">Save & Sync</button>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="statusMsg"></div>

<script>
const REPO_OWNER = 'luranosmani024-ai';
const REPO_NAME  = 'ST117.github.io';
const DATA_PATH  = 'data/artworks.json';
const PASSWORD   = 'Tetova357357';

let githubToken = localStorage.getItem('st117_token') || '';

// Login
document.getElementById('loginBtn').onclick = () => {
  if(document.getElementById('pwInput').value === PASSWORD) {
    document.getElementById('loginScreen').classList.add('gone');
    document.getElementById('app').classList.add('on');
    if(githubToken) {
      document.getElementById('ghToken').value = githubToken;
      fetchArchive();
    }
  } else { alert("Access Denied"); }
};

function showPanel(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  btn.classList.add('active');
  if(id === 'archive') fetchArchive();
}

function preview(input, imgId, textId) {
  const file = input.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = document.getElementById(imgId);
      img.src = e.target.result;
      img.style.display = 'block';
      if(textId) document.getElementById(textId).style.display = 'none';
    };
    reader.readAsDataURL(file);
  }
}

function saveToken() {
  const t = document.getElementById('ghToken').value;
  localStorage.setItem('st117_token', t);
  githubToken = t;
  notify("Access Token Saved", "ok");
  fetchArchive();
}

async function fetchArchive() {
  if(!githubToken) return;
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_PATH}`, {
      headers: { 'Authorization': `token ${githubToken}` }
    });
    if(!res.ok) throw new Error();
    const data = await res.json();
    const works = JSON.parse(atob(data.content));
    const list = document.getElementById('archiveList');
    
    // Reverse so latest is first
    const displayWorks = [...works].reverse();
    
    list.innerHTML = displayWorks.map((w, i) => {
        const actualIdx = works.length - 1 - i;
        const imgSrc = w.image.startsWith('http') ? w.image : `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/${w.image}`;
        return `
      <div class="archive-item">
        <img src="${imgSrc}" class="archive-thumb" onerror="this.src='https://via.placeholder.com/50'">
        <div class="archive-info">
          <div style="font-weight:700;">${w.title}</div>
          <div style="font-size:0.6rem; color:var(--ink-soft);">${w.type}</div>
        </div>
        <button class="btn-del" onclick="deleteWork(${actualIdx})">Delete</button>
      </div>
    `}).join('');
  } catch(e) {
    document.getElementById('archiveList').innerHTML = "<p style='color:var(--ink-soft)'>Archive file not yet initialized. Publish your first work.</p>";
  }
}

async function deleteWork(index) {
  if(!confirm("Are you sure you want to remove this artwork?")) return;
  notify("Removing...", "ok");
  
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_PATH}`, {
      headers: { 'Authorization': `token ${githubToken}` }
    });
    const jsonContent = await res.json();
    let works = JSON.parse(atob(jsonContent.content));
    const sha = jsonContent.sha;

    works.splice(index, 1);

    await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_PATH}`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${githubToken}` },
        body: JSON.stringify({
          message: `Delete artwork at index ${index}`,
          content: btoa(JSON.stringify(works, null, 2)),
          sha: sha
        })
    });
    
    notify("Deleted Successfully", "ok");
    fetchArchive();
  } catch(e) {
    notify("Delete failed", "err");
  }
}

document.getElementById('publishBtn').onclick = async () => {
  if(!githubToken) return notify("Token Missing", "err");
  
  const title = document.getElementById('artTitle').value;
  const type = document.getElementById('artType').value;
  const year = document.getElementById('artYear').value;
  const file = document.getElementById('artworkFile').files[0];

  if(!title || !file) return notify("Missing Info", "err");

  const btn = document.getElementById('publishBtn');
  btn.innerText = "Deploying..."; btn.disabled = true;

  try {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
      const imgBase64 = reader.result.split(',')[1];
      const fileName = `art-${Date.now()}.jpg`;
      const imgPath = `assets/portfolio/${fileName}`;

      // 1. Upload Image to GitHub
      await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${imgPath}`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${githubToken}` },
        body: JSON.stringify({ message: `Upload ${title}`, content: imgBase64 })
      });

      // 2. Fetch and Update artworks.json
      const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_PATH}`, {
        headers: { 'Authorization': `token ${githubToken}` }
      });
      
      let works = [];
      let sha = null;
      if(res.ok) {
        const jsonContent = await res.json();
        works = JSON.parse(atob(jsonContent.content));
        sha = jsonContent.sha;
      }

      works.push({ title, type, year, image: imgPath });

      await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_PATH}`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${githubToken}` },
        body: JSON.stringify({
          message: `Add ${title} to archive`,
          content: btoa(JSON.stringify(works, null, 2)),
          sha: sha
        })
      });

      notify("Successfully Deployed", "ok");
      // Reset form
      document.getElementById('artTitle').value = "";
      document.getElementById('artworkFile').value = null;
      document.getElementById('artworkPreview').style.display = 'none';
      document.getElementById('uploadText').style.display = 'block';
      btn.innerText = "Confirm & Deploy"; btn.disabled = false;
      fetchArchive();
    };
  } catch(e) {
    notify("Deploy Failed", "err");
    btn.disabled = false;
  }
};

function notify(txt, cls) {
  const m = document.getElementById('statusMsg');
  m.innerText = txt; m.className = cls; m.style.display = 'block';
  setTimeout(() => m.style.display='none', 3000);
}
</script>
</body>
</html>
